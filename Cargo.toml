[package]
name = "rigger"
version = "0.1.0"
edition = "2021"
description = "A config-driven, event-sourced multi-agent dev-loop harness"
license = "MIT"
repository = "https://github.com/virtual-velocitation/rigger"

[lib]
name = "rigger"
path = "src/lib.rs"

[[bin]]
name = "rigger"
path = "src/main.rs"

[features]
# The real turbovec engine (semantic vector grounding) + fastembed. Opt-in: it
# pulls the ONNX runtime and downloads an embedding model, so the default build
# stays light and the grounder falls back to grep.
turbovec = ["dep:turbovec", "dep:fastembed"]

[dependencies]
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
uuid = { version = "1", features = ["v4"] }
thiserror = "2"
turbovec = { git = "https://github.com/RyanCodrai/turbovec", optional = true }
fastembed = { version = "4", optional = true }

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
