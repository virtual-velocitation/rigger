name: Bug report
description: Report something that is not working as described.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence that reproduces the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Rigger version or commit
    validations:
      required: false
