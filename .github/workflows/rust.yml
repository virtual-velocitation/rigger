name: rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The default build now INCLUDES turbovec (it is a default cargo feature), so this
  # job builds + tests the real semantic grounder. Turbovec pulls the ONNX runtime
  # and needs OpenBLAS, installed before any cargo step; CARGO_BUILD_JOBS / the
  # committed .cargo/config.toml (jobs = 8) keep peak build memory bounded. The
  # turbovec model-loading test downloads ~130 MB of weights, so it is left to local
  # runs (every other test runs here).
  build-test:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 8
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: install OpenBLAS (turbovec is in the default build)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --verbose
      - name: test
        run: cargo test --verbose
      # The deliberate light opt-out: `--no-default-features` drops turbovec so the
      # grep-only build (no ONNX/OpenBLAS) stays green. The loud "built without the
      # turbovec feature" path is asserted by select_grounder's no-feature test here.
      - name: build + test (grep-only, --no-default-features)
        run: |
          cargo build --no-default-features --verbose
          cargo test --no-default-features --verbose

  # The KurrentDB EventStore adapter. Its contract test spins up a real KurrentDB
  # via testcontainers (the runner provides Docker), so it runs the same suite the
  # SQLite store passes - proxy fidelity.
  kurrentdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Drop the default features so this DB-adapter job does not pull turbovec's
      # ONNX runtime (and OpenBLAS) just to exercise the KurrentDB contract test;
      # it stays focused and light.
      - name: clippy
        run: cargo clippy --no-default-features --features kurrentdb --lib --tests -- -D warnings
      - name: contract test (KurrentDB via testcontainers)
        run: cargo test --no-default-features --features kurrentdb eventstore::kurrentdb -- --test-threads=1
