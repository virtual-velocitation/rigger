name: rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The default build now INCLUDES turbovec (it is a default cargo feature), so this
  # job builds + tests the real semantic grounder. Turbovec pulls the ONNX runtime
  # and needs OpenBLAS, installed before any cargo step; CARGO_BUILD_JOBS / the
  # committed .cargo/config.toml (jobs = 8) keep peak build memory bounded. The
  # turbovec model tests DO run here: `cargo test` below downloads the ~130 MB of
  # embedding weights on first use and runs them on CPU (no GPU in CI). They are
  # serialized cross-binary via serial_test's file lock (the `turbovec_model` key), so
  # even though CI has no CUDA session to corrupt, no two model constructions overlap.
  build-test:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 8
      # Pin fastembed's model cache to a stable, absolute path (its default is a
      # `.fastembed_cache` dir in the CWD) so the cache step below can key on it and
      # restore the ~130 MB of embedding weights across runs.
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          # rust-cache restores the compiled `ort-sys` crate but NOT ort's downloaded ONNX
          # runtime, which lives in ~/.cache/ort.pyke.io (outside the cargo dirs). On a WARM
          # cache ort-sys is not rebuilt, so its build script never re-downloads the runtime,
          # leaving that dir empty on the fresh runner -> ort falls back to the bare
          # `libonnxruntime.so` and panics ("cannot open shared object file"), poisoning
          # CONSTRUCT_MU and cascading through every turbovec test. Cache the runtime
          # alongside the build so the two are restored coherently; the prefix-key bump forces
          # one cold rebuild that repopulates both from scratch. The fastembed model weights
          # (~130 MB, downloaded on first `cargo test` model use into FASTEMBED_CACHE_DIR,
          # pinned below to a stable path) ride the SAME rust-cache so the whole ONNX/embed
          # working set is restored coherently in one step - no separate, overlapping cache.
          prefix-key: "v1-rust-ort"
          cache-directories: |
            ~/.cache/ort.pyke.io
            ${{ github.workspace }}/.fastembed_cache
      - name: install OpenBLAS (turbovec is in the default build)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: fmt
        run: cargo fmt --check
      - name: clippy (turbovec, default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --verbose
      - name: test
        run: cargo test --verbose
      # The deliberate light opt-out: `--no-default-features` drops turbovec so the
      # grep-only build (no ONNX/OpenBLAS) stays green. It gets the SAME gate battery
      # as the turbovec lane - clippy `--all-targets -D warnings` then build + test -
      # so a warning that only surfaces under the grep-only cfg (dead code behind the
      # turbovec feature, an unused import in the fallback path) fails CI instead of
      # silently rotting. The loud "built without the turbovec feature" path is asserted
      # by select_grounder's no-feature test here.
      - name: clippy (grep-only, --no-default-features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: build + test (grep-only, --no-default-features)
        run: |
          cargo build --no-default-features --verbose
          cargo test --no-default-features --verbose

  # Regression guard for dependency skew on a FRESH resolve. `cargo install` without
  # `--locked` ignores the committed Cargo.lock and re-resolves every dependency to the
  # newest version its constraints allow. That is how an end user installs (the README's
  # `cargo install --git ...` carries no `--locked`), and it is exactly where a transitive
  # crate can skew FORWARD past a pinned direct dep: `ort =2.0.0-rc.9` only requires
  # `ort-sys = "2.0.0-rc.9"`, which under pre-release semver matches rc.10/rc.11/rc.12, and
  # rc.10+ regenerated the OrtApi bindings incompatibly, breaking rc.9's `ortsys!` macro
  # (267 compile errors). Cargo.toml now pins `ort-sys = "=2.0.0-rc.9"` so the fresh resolve
  # stays coherent; this job proves it by actually running the no-`--locked` install into a
  # throwaway --root and executing the resulting binary, so any future forward-skew of
  # ort-sys (or any other transitive crate) fails CI here instead of only biting a user who
  # runs `cargo install`. Turbovec is in the default build, so this needs OpenBLAS + the ort
  # ONNX runtime, cached like the build-test job.
  install-nolock:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 8
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-ort"
          cache-directories: |
            ~/.cache/ort.pyke.io
            ${{ github.workspace }}/.fastembed_cache
      - name: install OpenBLAS (turbovec is in the default build)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      # No `--locked`: force a fresh resolution so a forward-skewed transitive dep is
      # caught. `--root "$RUNNER_TEMP/rigger-install"` keeps the install out of the way.
      - name: cargo install --path . WITHOUT --locked (fresh resolve)
        run: cargo install --path . --force --root "$RUNNER_TEMP/rigger-install"
      # Execute the freshly-installed binary: a clean resolve that produces a broken
      # binary is still a failure, so prove it runs (prints usage, exits without a crash).
      - name: run the installed binary
        run: "$RUNNER_TEMP/rigger-install/bin/rigger --help"

  # The KurrentDB EventStore adapter. Its contract test spins up a real KurrentDB
  # via testcontainers (the runner provides Docker), so it runs the same suite the
  # SQLite store passes - proxy fidelity.
  kurrentdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Drop the default features so this DB-adapter job does not pull turbovec's
      # ONNX runtime (and OpenBLAS) just to exercise the KurrentDB contract test;
      # it stays focused and light.
      - name: clippy
        run: cargo clippy --no-default-features --features kurrentdb --lib --tests -- -D warnings
      - name: contract test (KurrentDB via testcontainers)
        run: cargo test --no-default-features --features kurrentdb eventstore::kurrentdb -- --test-threads=1
