name: rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --verbose
      - name: test
        run: cargo test --verbose

  # The opt-in turbovec feature (native turbovec + fastembed). It needs OpenBLAS
  # and pulls the ONNX runtime, so it builds in its own job and the model-loading
  # test is left to local runs (it would download ~130 MB of weights).
  turbovec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: clippy
        run: cargo clippy --features turbovec --lib --bins -- -D warnings
      - name: build
        run: cargo build --features turbovec

  # The KurrentDB EventStore adapter. Its contract test spins up a real KurrentDB
  # via testcontainers (the runner provides Docker), so it runs the same suite the
  # SQLite store passes - proxy fidelity.
  kurrentdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --features kurrentdb --lib --tests -- -D warnings
      - name: contract test (KurrentDB via testcontainers)
        run: cargo test --features kurrentdb eventstore::kurrentdb -- --test-threads=1
