# Rigger developing Rigger: the self-hosting producing loop, expressed as
# Rigger CONTENT.
#
# This is the canonical example of a Rigger project - and it produces Rigger
# itself. Rigger is a pure-Rust crate now, so every gate below is a real cargo
# invocation matching the repo's CI (.github/workflows/rust.yml). Run it from
# the repo root with `rigger run <spec>` (the standalone CLI driver) or
# `rigger serve` (the Workflow + MCP driver, agents in-process). Validate it
# with `rigger validate`.
#
# The loop reinforces itself: every agent is grounded on only the code it needs,
# records each decision live to the shared event log (so the next stage and any
# concurrent agent see it), and must pass machine-verifiable gates. Failures
# escalate or are bounded-retried - never silently dropped.
name: rigger-self-hosted

defaults:
  autonomy: auto_notify     # manual | auto_notify | silent
  grounder: grep            # grep (default, dependency-free) | turbovec (needs the cargo feature)

gates:                      # the project's verification library, referenced by name
  fmt:    { run: "cargo fmt --check",                        kind: core }
  clippy: { run: "cargo clippy --all-targets -- -D warnings", kind: core }
  build:  { run: "cargo build",                              kind: core }
  test:   { run: "cargo test",                               kind: core }

stages:
  # 1. Decompose the spec into a unit DAG, each unit mapped to an acceptance
  #    criterion. coverage: required blocks if any criterion has no unit.
  plan:
    agent: planner
    produces: dag           # decompose the spec into a unit DAG at runtime
    coverage: required

  # 2. Implement in parallel: one Rust implementer per ready unit, each in an
  #    isolated worktree, partitioned by blast-radius so the waves stay disjoint.
  #    red -> green is enforced around each change before the gates run.
  implement:
    needs: [plan]
    agent: rust-engineer
    strategy: fan-out
    partition: by-blast-radius
    gates: [fmt, build, test]
    coverage: "each unit is implemented and its fmt + build + test gates pass"

  # 3. Three-tier review. TIER 1: the expert lenses (architecture + sdet) review
  #    the diff in parallel and emit findings. TIER 2: the adversary then reviews
  #    THE LENSES' findings and tries to prove them wrong - it holds them to a
  #    higher bar, surfaces what they all missed, and refutes overreach (it reviews
  #    the reviews; it is not a parallel lens). TIER 3: the adjudicator is the
  #    neutral final judge - it weighs the lenses against the adversary, is
  #    EXTREMELY strict on design/architecture adherence, and its approve/reject
  #    verdict GATES integration. A human signs off too (autonomy: manual).
  review:
    needs: [implement]
    strategy: fan-out
    agents: [architecture-reviewer, sdet]   # tier 1: the expert lenses
    adversary: adversary                    # tier 2: refutes the lenses
    adjudicator: adjudicator                # tier 3: neutral judge; verdict gates
    autonomy: manual
    coverage: "the change survives three-tier adversarial review"

  # 4. Land the reviewed change on a fully green workspace: rebase, re-gate with
  #    the full cargo set, merge, reindex, record.
  integrate:
    needs: [review]
    gates: [fmt, clippy, build, test]
    on_pass: merge
    coverage: "the change lands on a fully green workspace"
