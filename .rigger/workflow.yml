# Rigger configuring Rigger: a self-reinforcing dev/test feedback loop.
#
# This is the canonical example of a Rigger project - and it builds Rigger itself.
# Run it with `rigger serve` (the Workflow + MCP driver, agents in-process) or
# `rigger run` (the standalone CLI driver). Validate it with `rigger validate`.
#
# The loop reinforces itself: every agent is grounded on only the code it needs,
# records its decisions live to the shared event log (so the next stage and any
# concurrent agent see them), and must pass machine-verifiable gates. Failures
# escalate or are bounded-retried - never silently dropped.
name: rigger-self-hosted

defaults:
  autonomy: auto_notify
  grounder: grep

gates:
  build:       { run: "go build ./...", kind: core }
  vet:         { run: "go vet ./...", kind: core }
  test:        { run: "go test ./... -short -race -count=1", kind: core }
  lint:        { run: "golangci-lint run ./...", kind: core }
  integration: { run: "go test ./eventstore/kurrentdb/... -run TestKurrentDBContract -count=1", kind: elevated }

stages:
  # 1. Decompose the task into a unit DAG, each unit mapped to an acceptance criterion.
  plan:
    agent: planner
    coverage: "every acceptance criterion maps to a unit; no requirement unaddressed"

  # 2. Implement in parallel: the Go core and the JS/MCP surface (disjoint, no conflict).
  implement-go:
    needs: [plan]
    agent: go-engineer
    coverage: "the Go core: event store, context graph, config, conductor, drivers, MCP server"
    gates: [build, vet, test, lint]
  implement-js:
    needs: [plan]
    agent: js-engineer
    coverage: "the Workflow shim and the MCP bridge integration"

  # 3. Strengthen tests until done is machine-verifiable, including the KurrentDB integration.
  harden:
    needs: [implement-go, implement-js]
    agent: sdet
    coverage: "the contract suite, the testcontainers integration, race + table-driven coverage"
    gates: [build, vet, test, lint, integration]

  # 4. Review through three lenses in parallel; the adjudicator makes the call.
  review:
    needs: [harden]
    agents: [adversary, architecture-reviewer, harness-engineer]
    adjudicator: adjudicator
    gates: [build, vet, test, lint]

  # 5. Reconcile the docs with what actually shipped.
  document:
    needs: [review]
    agent: scribe
    coverage: "README, architecture.md, and the driver READMEs reflect the code"
    gates: [build]
