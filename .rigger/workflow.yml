# Rigger developing Rigger: the self-hosting producing loop, expressed as
# Rigger CONTENT.
#
# This is the canonical example of a Rigger project - and it produces Rigger
# itself. Rigger is a pure-Rust crate now, so every gate below is a real cargo
# invocation matching the repo's CI (.github/workflows/rust.yml). Run it from
# the repo root with `rigger run <spec>` (the standalone CLI driver) or
# `rigger serve` (the Workflow + MCP driver, agents in-process). Validate it
# with `rigger validate`.
#
# The loop reinforces itself: every agent is grounded on only the code it needs,
# records each decision live to the shared event log (so the next stage and any
# concurrent agent see it), and must pass machine-verifiable gates. Failures
# escalate or are bounded-retried - never silently dropped.
#
# The review is PER UNIT, not a downstream stage. Each implementer unit runs its
# OWN lifecycle - ground -> implement (red/green TDD in a worktree) -> the unit's
# gates -> three-tier review OF THIS UNIT (lenses -> adversary -> adjudicator) ->
# integrate - and a reject or a gate failure feeds back into that same unit's
# remediation loop. `defaults.review` declares the panel once; every unit (the
# `implement` stage and every planner-proposed unit) inherits it.
name: rigger-self-hosted

defaults:
  autonomy: auto_notify     # manual | auto_notify | silent
  grounder: turbovec        # turbovec (default; the real semantic grounder, a default cargo feature) | grep | nop

  # The spawn-budget circuit-breaker (§4.4, §8): the hard cap on agent spawns a
  # single unattended run may make. When spawns reach it the breaker records
  # BudgetExhausted and aborts the run, so a runaway loop (e.g. a unit a reviewer
  # keeps rejecting) can never spawn unboundedly. NON-ZERO on purpose - 0 means
  # unlimited, which is what let a 5-hour churn run never trip. Raise it for a big
  # spec; never set it back to 0 for an unattended run.
  # 2026-07-02: raised 60 -> 200 for the spec-05 campaign run. The count folds
  # cumulatively from recorded SpawnRequested events (never resets per process), and
  # 60 was consumed by one 12-implementer fan-out wave plus reviews, remediation,
  # two zombie units (Gap 11), and several crashed-process retries. 200 bounds ten
  # units' full review lifecycles; still a hard cap, never 0.
  # 2026-07-03: raised 200 -> 400 for the spec-06 run. The unscoped stream (Gap 11)
  # already holds exactly 200 spawns, so a new run under 200 halts before its first
  # spawn. Spec 06 unit 1 scopes the fold per run, making this cumulative-count
  # artifact obsolete; revisit the number after it lands.
  budget: 400

  # The remediation depth (§4.4): how many attempts a failed unit gets before it
  # escalates to a human. This is the REFINEMENT-depth knob, NOT a review-rigor
  # knob - it gives a subtle unit room to CONVERGE under the full strict review
  # instead of escalating prematurely. Raise it when a unit's defects are genuine
  # but DIMINISHING across iterations (the lenses go clean, only the adversary's
  # deep findings remain) and the default 3 is too few to converge; it loosens the
  # depth limit, never the review bar. Absent falls back to 3 (the historical
  # default). Bounded by `budget` above, so it can never spin unboundedly.
  max_retries: 6

  # The per-spawn wall-clock bound in SECONDS (spec 10, unit 3): the liveness ceiling
  # every spawn inherits unless its agent's frontmatter sets its own `max_wall_clock`
  # (per-role override). A worker keeps a per-spawn heartbeat marker fresh under
  # <scratch>/agent-live while it works; `rigger step`'s liveness sweep treats a marker
  # stale beyond this bound as a HUNG agent - an INFRASTRUCTURE fault routed through the
  # failure taxonomy (infra), recorded on the spawn's id and charging the unit NO
  # remediation attempt (its code is not at fault) - so a hung agent halts the wave
  # VISIBLY instead of stalling it invisibly. Recover by recording a real result on the
  # named spawn (last-write-wins) and re-driving. 0 (absent) means unbounded - liveness
  # timeouts are opt-in and an un-set workflow is byte-for-byte back-compatible. 3600s
  # (1h) is a deliberately generous "definitely hung" ceiling for this repo's cargo-heavy
  # workers; a fast reviewer role can pin a tighter bound in its own frontmatter.
  max_wall_clock: 3600

  # The three-tier review panel applied to EVERY implementer unit (§3.2). TIER 1:
  # the expert lenses (architecture + sdet) review the unit's diff in parallel.
  # TIER 2: the adversary reviews THE LENSES' findings and tries to prove them
  # wrong - higher bar, surfaces what they all missed, refutes overreach (it
  # reviews the reviews; it is not a parallel lens). TIER 3: the adjudicator is the
  # neutral final judge - it weighs the lenses against the adversary, is EXTREMELY
  # strict on design/architecture adherence, and its approve/reject verdict GATES
  # the unit's integration. Declared once; inherited by the implement stage and
  # every planner-proposed unit.
  review:
    lenses: [architecture-reviewer, sdet]   # tier 1: the expert lenses
    adversary: adversary                    # tier 2: refutes the lenses
    adjudicator: adjudicator                # tier 3: neutral judge; verdict gates

  # The declarative failure taxonomy (spec 10, unit 2). An ORDERED, first-match-wins
  # list of rules that classify a failure signal (a process's `exit_status`, terminating
  # `signal`, and/or an `output_regex` over its captured output) into a `class` -
  # `infra` | `product` | `flaky` - with a per-rule rerun `limit` and exponential
  # `backoff` ({duration_ms, factor, max_ms}). It replaces the infra-vs-product split the
  # conductor hand-coded across its gate/spawn sites (R1). At an inline gate the class
  # drives the three-way outcome: a `product` failure fails immediately and demotes the
  # autonomy ratchet (today's behavior); a `flaky`/`infra` failure is rerun up to `limit`
  # and a MIXED result (it passed on a rerun) is a FlakyVerdict pass-with-warning that
  # NEVER demotes; a `flaky` that stays red demotes, an `infra` that stays red does not.
  #
  # OMITTED (as here) means the shipped code default (`failure::Taxonomy::default`) is
  # used, whose rules preserve spec-07 semantics: recognised transient infra faults
  # (out of disk, refused/reset connection, DNS failure) classify `infra` and reran;
  # everything else is `product` (no rerun). Uncomment to author your own, e.g.:
  #
  # failure_rules:
  #   - match: {output_regex: "SIGSEGV|thread panicked while panicking"}
  #     class: flaky
  #     limit: 2
  #     backoff: {duration_ms: 1000, factor: 2.0, max_ms: 30000}
  #   - match: {exit_status: 137}          # OOM-killed worker
  #     class: infra
  #     limit: 1
  #   - match: {}                          # catch-all: any other failure is a defect
  #     class: product

gates:                      # the project's verification library, referenced by name
  fmt:    { run: "cargo fmt --check",                        kind: core }
  clippy: { run: "cargo clippy --all-targets -- -D warnings", kind: core }
  build:  { run: "cargo build",                              kind: core }
  test:   { run: "cargo test",                               kind: core }
  # The style gate (Gap 4a): a mechanically-checkable style constraint becomes a
  # gate rather than relying on ambient reviewer attention. It FAILS when the
  # unit's OWN diff against the run base introduces an em dash (U+2014) in any
  # added text - code, comments, docs, prompts - and PASSES on a clean diff. It
  # runs in the unit worktree (cwd), so a three-dot diff from the run branch
  # (`rigger-run`, with an origin/main / HEAD fallback) reports only THIS branch's
  # changes, never the whole tree. The em dash byte pattern is generated at runtime
  # via `printf` octal (portable to POSIX sh / dash and bash), so this gate command
  # carries no literal em dash and therefore passes on its own diff.
  style:
    run: 'em=$(printf "\342\200\224"); base=$(git rev-parse --verify -q rigger-run || git rev-parse --verify -q origin/main || git rev-parse --verify -q HEAD); if git diff "$base"...HEAD | grep "^+" | grep -v "^+++ " | grep -qF "$em"; then echo "style gate FAILED: an em dash (U+2014) was introduced; use a hyphen"; exit 1; fi'
    kind: core

stages:
  # 1. Refine the spec's decomposition. The conductor itself creates one baseline
  #    implement unit per acceptance criterion (the deterministic decomposition);
  #    the planner REFINES that baseline - splitting a criterion into several units,
  #    or adding a necessary sub-unit / dependency - via UnitProposed. A produces
  #    stage decomposes the whole spec, so it has no single coverage criterion: it
  #    grounds on the spec's acceptance criteria, not on a `coverage` label.
  plan:
    agent: planner
    produces: dag           # refine the spec's unit DAG at runtime

  # 1b. Adversarial plan-critique gate (spec 10, Unit 1). Before ANY implementer
  #    spawns, the existing adversary + adjudicator review the PROPOSED unit DAG the
  #    planner produced: the conductor surfaces a deterministic rule-6 blast-radius
  #    analysis (which units share a blast radius), and the reviewers judge the whole
  #    decomposition against handbook rules 6-8 (shared blast radius, mitigation
  #    ownership, open dispositions - docs/handbook/authoring-loops.md). A reject feeds
  #    back to the planner (bounded by max_retries); only an approve RELEASES the
  #    fan-out. It is review-only (no `agent`) - it critiques the plan, it does not
  #    implement - and it needs `plan`, so the conductor runs it between planning and
  #    the fan-out. Owns: pre-fan-out decomposition review. Per-unit review is untouched.
  #    Gap 22 root-cause fix (2026-07-07): the critique excludes already-integrated and
  #    terminal units (`dag_unit_blast_radii`), so an integrated unit is never flagged as
  #    a duplicate the planner cannot resolve - the gate is safe even when introduced
  #    mid-run and stays wired into rigger's own loop.
  plan-critique:
    needs: [plan]
    adversary: adversary        # tier 2: reviews the DAG and refutes it
    adjudicator: adjudicator    # tier 3: its approve/reject gates the fan-out

  # 2. Implement, review, and integrate PER UNIT. One Rust implementer per ready
  #    unit, each in an isolated worktree, partitioned by blast-radius so the waves
  #    stay disjoint. Each unit's complete lifecycle runs inside this one stage:
  #    red -> green is enforced around the change, the full gate set
  #    (fmt + clippy + build + test + style) must pass, THEN the unit reviews ITSELF through
  #    `defaults.review`'s three tiers, and only on adjudicator-approve + green gates
  #    does it integrate (on_pass: merge). A reject or a gate failure feeds back into
  #    this same unit's remediation loop (re-ground, re-implement with the feedback)
  #    and escalates after the retry bound - it does NOT integrate. Every
  #    planner-proposed unit inherits the same per-unit review via defaults.review.
  implement:
    needs: [plan-critique]
    agent: rust-engineer
    strategy: fan-out
    partition: by-blast-radius
    gates: [fmt, clippy, build, test, style]
    on_pass: merge
    coverage: "each unit is implemented, three-tier-reviews itself, and integrates on a green workspace"
